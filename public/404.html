<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sayfa bulunamadı · Dipnot</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg: #131b26;
        --accent: #6ad0e3;
        --text: #ffffff;
        --text-muted: rgba(255, 255, 255, 0.68);
        --text-subtle: rgba(255, 255, 255, 0.45);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        height: 100%;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        font-size: 16px;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
      }

      .container {
        max-width: 360px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
      }

      .logo {
        width: 72px;
        height: 72px;
      }

      h1 {
        font-size: 24px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }

      .msg {
        color: var(--text-muted);
      }

      .link {
        color: var(--accent);
        text-decoration: none;
        font-weight: 600;
      }

      .link:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <main class="container">
      <img src="/assets/logo-white.svg" alt="Dipnot logo" class="logo" />
      <h1>Sayfa bulunamadı</h1>
      <p class="msg">
        Aradığın sayfa burada yok. Ana sayfaya dönebilirsin.
      </p>
      <a href="https://dipnot.app" class="link">dipnot.app'a git &rsaquo;</a>
    </main>
  </body>
</html>
